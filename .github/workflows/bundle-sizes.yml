name: Bundle sizes

# Report-only — uploads esbuild gzip sizes per @br-validators/core subpath.
# No regression gate in v1 (see phase 35h).

on:
  schedule:
    - cron: '0 12 * * 1'
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  measure:
    name: measure-subpath-sizes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Measure bundle sizes
        run: pnpm measure:bundle-sizes

      - name: Upload size report artifact
        uses: actions/upload-artifact@v4
        with:
          name: bundle-sizes-report
          path: |
            data/bundle-sizes/subpath-sizes.json
            data/bundle-sizes/subpath-sizes.md
            data/bundle-sizes/subpath-sizes-top10.md
          if-no-files-found: error
