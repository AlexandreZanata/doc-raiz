name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter br-validators test:coverage
      - run: pnpm --filter @br-validators/cli test:coverage
      - run: pnpm --filter br-validators build
      - run: pnpm --filter @br-validators/cli build
      - run: pnpm --filter @br-validators/playground build
